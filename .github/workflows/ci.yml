name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo test --workspace --no-run

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test, fmt, clippy]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@v7
        with:
          name: gamedock-linux-x86_64
          path: |
            target/release/gamedock-cli
            target/release/gamedock-gui

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: gamedock-linux-x86_64
          path: build/
      - run: |
          chmod +x build/gamedock-cli build/gamedock-gui
          mkdir -p packaging/deb/gamedock/usr/bin
          cp build/gamedock-cli packaging/deb/gamedock/usr/bin/
          cp build/gamedock-gui packaging/deb/gamedock/usr/bin/
          dpkg-deb --build packaging/deb/gamedock gamedock_0.1.0_amd64.deb
      - uses: actions/upload-artifact@v7
        with:
          name: gamedock-deb
          path: gamedock_0.1.0_amd64.deb
